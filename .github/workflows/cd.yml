name: CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Additional custom Docker image tag
        default: ""
        type: string
        required: false

  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: ["main"]

jobs:
  build-and-push:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get App Version
        id: version
        run: |
          version=$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build Tag List
        id: tags
        run: |
          REPO="${{ github.repository }}"
          TAGS="${REPO}:${{ steps.version.outputs.version }}"
          TAGS="${TAGS},${REPO}:${GITHUB_SHA::7}"
          TAGS="${TAGS},${REPO}:latest"
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            TAGS="${TAGS},${REPO}:${{ inputs.image_tag }}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_AT }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
